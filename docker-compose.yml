services:
  nginx:
    image: nginx:alpine
    container_name: cloudwatch-nginx
    ports:
      - "8100:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: .
    container_name: cloudwatch-app
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: cloudwatch-mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cloudwatch-redis
    restart: unless-stopped

volumes:
  mongo_data:

