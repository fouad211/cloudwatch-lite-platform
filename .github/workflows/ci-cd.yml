name: CloudWatch Lite CI/CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/fouad211/cloudwatch-lite-platform
  GITOPS_REPO: https://github.com/fouad211/devops-gitops.git

jobs:
  build-test-security-push-update-gitops:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout application code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .
          docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:latest

      - name: Save Docker image as tar
        run: |
          docker save $IMAGE_NAME:${{ github.sha }} -o image.tar

      - name: Basic image test
        run: |
          docker load -i image.tar
          docker run -d --name test-app -p 3000:3000 $IMAGE_NAME:${{ github.sha }}
          sleep 10
          docker ps
          docker logs test-app
          docker stop test-app
          docker rm test-app

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Push Docker image to GHCR
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest

      - name: Update GitOps image tag
        run: |
          git clone https://${{ secrets.GHCR_USERNAME }}:${{ secrets.GHCR_TOKEN }}@github.com/fouad211/devops-gitops.git
          cd devops-gitops

          sed -i "s/tag:.*/tag: ${{ github.sha }}/" cloudwatch-lite/helm/values-dev.yaml

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add cloudwatch-lite/helm/values-dev.yaml
          git commit -m "Update CloudWatch image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push
