name: CloudWatch Lite CI/CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/fouad211/cloudwatch-lite-platform

jobs:
  build-test-security-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .
          docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:latest

      - name: Save Docker image as tar
        run: |
          docker save $IMAGE_NAME:${{ github.sha }} -o image.tar

      - name: Basic image test
        run: |
          docker load -i image.tar
          docker run -d --name test-app -p 3000:3000 $IMAGE_NAME:${{ github.sha }}
          sleep 10
          docker ps
          docker stop test-app
          docker rm test-app

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest
